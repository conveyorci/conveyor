# Configuration for the Conveyor CI Server.
# When using Docker Compose, copy this file to 'config.yml' and fill in your secrets.
# The 'config.yml' file will be mounted into the server container.

server:
  # The port the web server will listen on inside the container.
  # The docker-compose file maps this to a port on your host machine.
  port: "8080"

  # The path to the SQLite database file INSIDE the container.
  # A Docker volume will be mounted here to make the data persistent.
  database: "conveyor.db"

security:
  # A long, random, secret key for securing user sessions.
  # Generate one with: openssl rand -hex 32
  session_key: "change-this-to-a-long-random-string"

  # The secret you configured in your GitHub webhook settings.
  github_webhook_secret: "change-this-to-your-github-webhook-secret"