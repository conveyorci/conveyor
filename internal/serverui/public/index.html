<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>Conveyor CI Status</title>
    <style>
        body {
            font-family: sans-serif;
            background-color: #f4f4f9;
            color: #333;
            text-align: center;
            margin-top: 50px;
        }

        h1 {
            color: #4a4a8a;
        }

        .status {
            background-color: #d4edda;
            color: #155724;
            padding: 20px;
            border-radius: 8px;
            display: inline-block;
        }

        table {
            width: 80%;
            margin: 20px auto;
            border-collapse: collapse;
        }

        th, td {
            padding: 12px;
            border: 1px solid #ddd;
        }

        th {
            background-color: #4a4a8a;
            color: white;
        }

        tr:nth-child(even) {
            background-color: #f2f2f2;
        }

        .status-success {
            color: green;
            font-weight: bold;
        }

        .status-failed {
            color: red;
            font-weight: bold;
        }

        .status-running {
            color: blue;
            font-weight: bold;
        }
    </style>
</head>
<body>
<h1>Conveyor CI</h1>
<div class="status">
    <p>The Conveyor CI server is up and running!</p>
    <p>This is a placeholder page. Will be changed in future updates.</p>
    <table id="jobs-table">
        <thead>
        <tr>
            <th>Job ID</th>
            <th>Image</th>
            <th>Status</th>
        </tr>
        </thead>
        <tbody>
        <!-- Job data will be inserted here by JavaScript -->
        </tbody>
    </table>
</div>
<script>
    async function fetchJobs() {
        try {
            const response = await fetch('/api/jobs');
            const jobs = await response.json();
            const tbody = document.querySelector('#jobs-table tbody');
            tbody.innerHTML = ''; // Clear existing rows

            for (const job of jobs) {
                const row = document.createElement('tr');
                row.innerHTML = `
                        <td>${job.id.substring(0, 8)}</td>
                        <td>${job.job.image}</td>
                        <td class="status-${job.status}">${job.status}</td>
                    `;
                tbody.appendChild(row);
            }
        } catch (error) {
            console.error('Failed to fetch jobs:', error);
        }
    }

    // Fetch jobs when the page loads, and then every 5 seconds
    fetchJobs();
    setInterval(fetchJobs, 5000);
</script>
</body>
</html>
