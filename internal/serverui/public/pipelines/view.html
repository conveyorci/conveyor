<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pipeline Detail - Conveyor CI</title>
    <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/fomantic-ui@2.9.4/dist/semantic.min.css">
    <script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/fomantic-ui@2.9.4/dist/semantic.min.js"></script>
    <style>
        .log-container {
            background-color: #1E1E1E;
            color: #D4D4D4;
            font-family: monospace;
            padding: 1em;
            border-radius: 5px;
            white-space: pre-wrap;
            word-wrap: break-word;
            max-height: 600px;
            overflow-y: auto;
        }
    </style>
</head>
<body>

<div class="ui fixed inverted green menu">
    <div class="ui container">
        <div class="header item">
            <i class="box icon"></i>
            Conveyor
        </div>
        <a href="#" class="item">Repositories</a>
        <a href="#" class="item">Docs</a>
        <a href="#" class="item">API</a>
        <div class="right menu">
            <a class="item"><i class="cog icon"></i></a>
            <div class="item">
                <img class="ui avatar image" src="https://avatars.githubusercontent.com/u/154914363?v=4">
            </div>
        </div>
    </div>
</div>

<div class="ui main container" style="margin-top: 6em;">
    <div id="pipeline-header">
        <!-- pipeline summary will be injected here -->
    </div>

    <div class="ui top attached tabular menu">
        <a class="item active" data-tab="logs">Logs</a>
        <a class="item" data-tab="artifacts">Artifacts</a>
    </div>

    <div class="ui bottom attached tab segment active" data-tab="logs">
        <pre class="log-container" id="log-output">Loading logs...</pre>
    </div>

    <div class="ui bottom attached tab segment" data-tab="artifacts">
        <div class="ui list" id="artifact-list">
            <!-- artifact links will be injected here -->
        </div>
    </div>
</div>

<script>
    const urlParams = new URLSearchParams(window.location.search);
    const jobId = urlParams.get('id');

    async function fetchDetails() {
        const details = await fetch(`/api/pipelines/${jobId}`).then(res => res.json());
        // TODO: populate #pipeline-header with commit message, author, status, etc.

        // TODO: complete the real-time logs
        const logs = await fetch(`/api/logs/${jobId}`).then(res => res.text());
        document.getElementById('log-output').textContent = logs;

        const artifacts = await fetch(`/api/artifacts/${jobId}`).then(res => res.json());
        // TODO: populate #artifact-list with download links
    }

    $(document).ready(function() {
        $('.menu .item').tab();
    });

    fetchDetails();
    setInterval(fetchDetails, 3000);
</script>
</body>
</html>
