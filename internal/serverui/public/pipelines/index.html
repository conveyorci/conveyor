<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>Conveyor CI Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/fomantic-ui@2.9.4/dist/semantic.min.css" rel="stylesheet" type="text/css">
    <script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/fomantic-ui@2.9.4/dist/semantic.min.js"></script>
    <style>
        body {
            background-color: #F9FAFB;
        }

        .main.container {
            margin-top: 6em;
        }

        .status-bar {
            width: 5px !important;
            padding: 0 !important;
        }

        .job-item .content {
            display: grid;
            grid-template-columns: 3fr 2fr 2fr;
            width: 100%;
            align-items: center;
        }

        .job-item .meta {
            color: rgba(0, 0, 0, .6);
            font-size: 0.9em;
        }

        .job-item .commit-sha {
            font-family: monospace;
        }

        .sticky-column {
            position: sticky;
            top: 6em;
        }
    </style>
</head>
<body>
<header class="ui fixed inverted green menu"></header>
<div class="ui main container">
    <h1 class="ui header" id="repo-header">Builds for...</h1>
    <div class="ui grid">
        <div class="ten wide column">
            <div class="ui stacked segment">
                <div class="ui relaxed divided list" id="build-feed">
                    <!-- build items will be injected here -->
                </div>
            </div>
        </div>
        <div class="six wide column">
            <div class="sticky-column">
                <div class="ui segment">
                    <h3 class="ui header">Recent Activity</h3>
                    <div class="ui relaxed divided list" id="activity-feed"></div>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="/js/components/header.js"></script>
<script>
    const statusMap = {
        success: {color: 'green', icon: 'check circle outline'},
        failed: {color: 'red', icon: 'times circle outline'},
        running: {color: 'blue', icon: 'play circle outline'},
        pending: {color: 'grey', icon: 'pause circle outline'}
    };

    function timeAgo(dateStr) {
        if (!dateStr) return 'N/A';
        return new Date(dateStr).toLocaleString();
    }

    function createBuildItemHTML(job) {
        const status = statusMap[job.status] || statusMap.pending;
        const shortSha = (job.commit_sha || '').substring(0, 8);
        const friendlyRef = (job.commit_ref || '').replace('refs/heads/', '');
        const timeAgo = timeAgo(job.created_at);
        const duration = 'N/A';

        return `
            <a class="item job-item" href="/pipelines/view.html?id=${job.id}">
                <div class="left floated status-bar ${status.color} attached"></div>
                <i class="large middle aligned icon ${status.icon} ${status.color}"></i>
                <div class="content">
                    <div>
                        <div class="header">${job.commit_message || 'No commit message'}</div>
                        <div class="description">${job.repo_name || 'Unknown repository'}</div>
                    </div>
                    <div class="meta">
                        <div><i class="fork icon"></i>${friendlyRef}</div>
                        <div><i class="code branch icon"></i><span class="commit-sha">${shortSha}</span></div>
                    </div>
                    <div class="meta">
                        <div><i class="clock outline icon"></i>${duration}</div>
                        <div><i class="calendar alternate outline icon"></i>${timeAgo}</div>
                    </div>
                </div>
            </a>
        `;
    }

    function createActivityItemHTML(job) {
        const status = statusMap[job.status] || statusMap.pending;
        return `
                <div class="item">
                    <i class="large middle aligned icon ${status.icon} ${status.color}"></i>
                    <div class="content">
                        <div class="header">${job.repo_name || 'Unknown repository'}</div>
                        <div class="description">${job.commit_message || 'No commit message'}</div>
                    </div>
                </div>
            `;
    }

    async function renderFeeds() {
        const buildFeed = document.getElementById('build-feed');
        const activityFeed = document.getElementById('activity-feed');

        try {
            const urlParams = new URLSearchParams(window.location.search);
            const repoName = urlParams.get('repo');

            const response = await fetch(`/api/jobs?repo=${repoName}`);
            if (!response.ok) {
                if (response.status === 401 || response.status === 403) {
                    window.location.href = '/login.html';
                    return;
                }
                throw new Error(`Server responded with status: ${response.status}`);
            }

            const jobs = await response.json();
            if (!jobs || jobs.length === 0) {
                buildFeed.innerHTML = '<div class="ui message"><p>No builds found for this repository.</p></div>';
                activityFeed.innerHTML = '<div class="ui message"><p>No recent activity.</p></div>';
                return;
            }
            buildFeed.innerHTML = jobs.map(createBuildItemHTML).join('');
            activityFeed.innerHTML = jobs.map(createActivityItemHTML).join('');
        } catch (error) {
            console.error("API Error:", error);
            buildFeed.innerHTML = '<div class="ui negative message"><p>Failed to load build data from the server.</p></div>';
        }
    }

    document.addEventListener('DOMContentLoaded', () => {
        const urlParams = new URLSearchParams(window.location.search);
        const repoName = urlParams.get('repo');
        document.title = `${repoName || 'Pipelines'} - Conveyor CI`;
        document.getElementById('repo-header').textContent = `Builds for ${repoName || 'Unknown Repository'}`;
        renderHeader('.ui.fixed.menu');
        renderFeeds();
        setInterval(renderFeeds, 5000);
    });
</script>
</body>
</html>
