<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>Page Not Found - Conveyor CI</title>
    <link href="https://cdn.jsdelivr.net/npm/fomantic-ui@2.9.4/dist/semantic.min.css" rel="stylesheet" type="text/css">
    <script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/fomantic-ui@2.9.4/dist/semantic.min.js"></script>
    <style>
        body {
            background-color: #F9FAFB;
        }

        body > .grid {
            height: 100vh;
        }

        .column {
            max-width: 550px; /* give it a little more width */
        }

        .icon.header i.icon {
            font-size: 5em;
            margin-bottom: 0.2em;
        }
    </style>
</head>
<body>

<div class="ui middle aligned center aligned grid">
    <div class="column">
        <div class="ui icon header">
            <i class="compass outline icon"></i>
            404 - Page Not Found
        </div>
        <div class="ui divider"></div>
        <p style="font-size: 1.2em;">Sorry, the page you are looking for does not exist.</p>
        <p>You may have mistyped the address or the page may have moved.</p>
        <a class="ui huge green button" href="/">
            <i class="home icon"></i>
            Go to Repositories
        </a>
    </div>
</div>

</body>
</html>
