name: Build Conveyor

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  build-amd64:
    runs-on: ubuntu-latest
    env:
      CGO_ENABLED: 1
      GO111MODULE: on
      GOOS: linux
      GOARCH: amd64
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21' # adjust to your Go version
      
      - name: Install cross-compilers
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-x86-64-linux-gnu
      
      - name: Build binaries
        run: |
          mkdir -p dist
          export CC=x86_64-linux-gnu-gcc
          for binary in conveyor-server conveyor-agent; do
            echo "Building $binary for linux/amd64"
            go build -ldflags="-s -w" -o dist/${binary}-linux-amd64 ./cmd/$binary
          done
      
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: conveyor-linux-amd64
          path: dist/*

  build-arm64:
    runs-on: ubuntu-latest
    env:
      CGO_ENABLED: 1
      GO111MODULE: on
      GOOS: linux
      GOARCH: arm64
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21' # adjust to your Go version
      
      - name: Install cross-compilers
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
      
      - name: Build binaries
        run: |
          mkdir -p dist
          export CC=aarch64-linux-gnu-gcc
          for binary in conveyor-server conveyor-agent; do
            echo "Building $binary for linux/arm64"
            go build -ldflags="-s -w" -o dist/${binary}-linux-arm64 ./cmd/$binary
          done
      
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: conveyor-linux-arm64
          path: dist/*